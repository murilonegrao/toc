name: Deploy TOC

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Testes
    runs-on: self-hosted
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Roda testes em container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e SECRET_KEY=fake-key-for-tests \
            -e "DATABASE_URL=sqlite:///:memory:" \
            -e S3_ACCESS_KEY_ID=dummy \
            -e S3_SECRET_ACCESS_KEY=dummy \
            -e S3_BUCKET_NAME=dummy \
            -e S3_ENDPOINT_URL=http://dummy \
            -e S3_REGION_NAME=us-east-1 \
            -e DJANGO_SETTINGS_MODULE=config.settings.development \
            python:3.12-slim \
            sh -c "pip install -r requirements/development.txt -q && python manage.py test --verbosity=2"

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: test
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          cd /opt/toc
          git pull origin main
          docker compose up -d --build app
          docker compose exec -T app python manage.py migrate --noinput