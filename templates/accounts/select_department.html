{% extends 'base_pending.html' %}

{% block title %}Selecionar Central{% endblock %}

{% block content %}
<div style="text-align:center; margin-bottom:1.25rem;">
    <h2 style="font-size:1rem; font-weight:700; color:#e5e7eb; margin-bottom:0.5rem;">
        Selecionar Central
    </h2>
    <p class="form-text">Selecione a sua central.</p>
</div>

<div class="d-flex flex-column gap-2">
    <form method="POST">
        {% csrf_token %}
        <select name="department" class="form-select">
            {% for department in departments %}
            <option value="{{ department.id }}">{{ department.name }}</option>
            {% endfor %}
        </select>
        <button type="submit" class="btn btn-primary w-100 mt-2">Selecionar</button>
    </form>
</div>
{% endblock %}
