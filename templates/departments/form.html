{% extends "base_app.html" %}

{% block title %}{{ action }} Departamento{% endblock %}

{% block content %}

<div class="page-header d-flex justify-content-between align-items-center">
    <div>
        <h1 class="page-title">{{ action }} Departamento</h1>
    </div>
    <a href="{% url 'departments:list' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left me-1"></i> Voltar
    </a>
</div>

<div class="card" style="max-width:500px;">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Nome *</label>
                <input type="text" name="name" class="form-control"
                    value="{{ dept.name|default:'' }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Sigla *</label>
                <input type="text" name="initials" class="form-control"
                    value="{{ dept.initials|default:'' }}"
                    maxlength="10" required
                    style="text-transform:uppercase;">
                <div class="form-text" style="color:#9ca3af; font-size:0.72rem;">
                    Máximo 10 caracteres. Ex: CAC, CCARPV
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Cor</label>
                <div class="d-flex align-items-center gap-2">
                    <input type="color" name="color" class="form-control form-control-color"
                        value="{{ dept.color|default:'#F4645F' }}" style="width:60px;">
                    <small style="color:#9ca3af;">Cor exibida na sidebar</small>
                </div>
            </div>

            <div class="mb-4">
                <div class="form-check form-switch">
                    <input type="checkbox" name="active" class="form-check-input"
                        id="active" {% if dept.active or not dept %}checked{% endif %}>
                    <label class="form-check-label" for="active">Departamento ativo</label>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i> Salvar
                </button>
                <a href="{% url 'departments:list' %}" class="btn btn-secondary">Cancelar</a>
            </div>

        </form>
    </div>
</div>

{% endblock %}
